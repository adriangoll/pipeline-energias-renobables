name: ETL Silver to Gold

on:
  push:
    branches:
      - main          # se ejecuta en cada push a main
  schedule:
    - cron: '0 6 * * *'   # también a las 6 AM UTC cada día (opcional, borrá si no querés)
  workflow_dispatch:        # mantiene la opción manual también

jobs:
  etl-gold:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install PySpark
        run: |
          pip install pyspark==3.5.0 boto3
      
      - name: Download Hadoop AWS JARs
        run: |
          mkdir -p $HOME/spark-jars
          wget -q https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.4.4/hadoop-aws-3.4.4.jar -P $HOME/spark-jars/
          wget -q https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.367/aws-java-sdk-bundle-1.12.367.jar -P $HOME/spark-jars/
      
      - name: Run ETL Silver to Gold
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # $HOME se expande correctamente acá, no en el bloque env:
          export PYSPARK_SUBMIT_ARGS="--jars $HOME/spark-jars/hadoop-aws-3.4.4.jar,$HOME/spark-jars/aws-java-sdk-bundle-1.12.367.jar pyspark-shell"
          python scripts_spark/etl_silver_to_gold.py